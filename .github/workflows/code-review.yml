name: Git Analyser — Qwen AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  qwen-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -q "code-review-graph>=2.3.6" openai requests

      - name: Build code-review-graph
        run: code-review-graph build . 2>&1 || true

      - name: Detect changes and export risk JSON
        run: |
          git fetch origin ${{ github.base_ref }} --depth=50 2>/dev/null || true
          code-review-graph detect-changes --base "origin/${{ github.base_ref }}" --format json > /tmp/crg-report.json 2>/dev/null || echo '{"risk_score":0,"changed_functions":[],"affected_flows":[],"test_gaps":[],"review_priorities":[]}' > /tmp/crg-report.json
          cat /tmp/crg-report.json

      - name: Run Qwen AI analysis and post PR comment
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_BRANCH: ${{ github.base_ref }}
          HEAD_BRANCH: ${{ github.head_ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 .github/scripts/qwen_review.py